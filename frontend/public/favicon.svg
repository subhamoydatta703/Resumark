  <rect x="2" y="2" width="28" height="28" rx="7" fill="#4f46e5" />
  
  <!-- Four-pointed Sparkle in center using Q Beziers -->
  <path d="M16 8 Q16 16 8 16 Q16 16 16 24 Q16 16 24 16 Q16 16 16 8 Z" fill="#ffffff" />
  
  <!-- Plus symbol in top right -->
